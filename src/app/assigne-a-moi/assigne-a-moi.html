<h2>Tickets Assignés à Moi</h2>

<div *ngIf="tickets.length === 0" class="empty-message">
  Aucun ticket ne vous est assigné.
</div>

<table mat-table [dataSource]="tickets" class="mat-elevation-z8" *ngIf="tickets.length > 0">

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> Titre </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.title }} </td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Description </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.description }} </td>
  </ng-container>

  <ng-container matColumnDef="statut">
    <th mat-header-cell *matHeaderCellDef> Statut </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.statut }} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['title', 'description', 'statut']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['title', 'description', 'statut'];"></tr>
</table>
